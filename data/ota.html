<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MeteoHub - Système</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Système</h1>
            <span id="status">Prêt</span>
        </header>

        <nav data-shared-menu="true" data-active="/ota.html"></nav>

        <div class="card ota-card">
            <h2>Envoyer un firmware (.bin)</h2>
            <input id="otaFile" type="file" accept=".bin" />
            <button id="otaBtn" class="btn">Lancer la mise à jour</button>

            <div class="ota-progress-wrap">
                <div id="otaProgress" class="ota-progress"></div>
            </div>

            <div id="otaResult" class="ota-result">En attente d'un fichier...</div>
        </div>

        <div class="card neo-card">
            <h2>Intensité de la LED (NeoPixel)</h2>
            <div class="neo-row">
                <input id="neoRange" type="range" min="0" max="100" step="1" value="0" />
                <span id="neoValue" class="neo-value">0 %</span>
            </div>
            <button id="neoBtn" class="btn">Enregistrer</button>
            <div id="neoResult" class="ota-result">Chargement...</div>
        </div>
    </div>

    <script src="menu.js"></script>
    <script>
        const fileInput = document.getElementById('otaFile');
        const button = document.getElementById('otaBtn');
        const progress = document.getElementById('otaProgress');
        const result = document.getElementById('otaResult');
        const status = document.getElementById('status');

        function setResult(message, state) {
            result.textContent = message;
            result.className = 'ota-result ' + state;
        }

        button.addEventListener('click', () => {
            const file = fileInput.files[0];
            if (!file) {
                setResult('Veuillez sélectionner un fichier .bin', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('update', file, file.name);

            button.disabled = true;
            progress.style.width = '0%';
            setResult('Upload en cours...', 'info');
            status.textContent = 'Mise à jour...';

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/ota/update', true);

            xhr.upload.onprogress = (event) => {
                if (!event.lengthComputable) return;
                const pct = Math.round((event.loaded / event.total) * 100);
                progress.style.width = pct + '%';
                status.textContent = 'Upload ' + pct + '%';
            };

            xhr.onload = () => {
                button.disabled = false;
                let payload = {};
                try { payload = JSON.parse(xhr.responseText || '{}'); } catch (_) {}

                if (xhr.status >= 200 && xhr.status < 300 && payload.ok) {
                    setResult('✅ Mise à jour valide. Redémarrage...', 'success');
                    status.textContent = 'OTA OK';
                    setTimeout(() => { window.location.href = '/'; }, 6000);
                    return;
                }

                setResult('❌ Échec OTA: ' + (payload.message || 'Erreur inconnue'), 'error');
                status.textContent = 'OTA KO';
            };

            xhr.onerror = () => {
                button.disabled = false;
                setResult("❌ Erreur réseau pendant l'upload OTA", 'error');
                status.textContent = 'OTA KO';
            };

            xhr.send(formData);
        });

        // --- Réglage de l'intensité de la NeoPixel ---
        const neoRange = document.getElementById('neoRange');
        const neoValue = document.getElementById('neoValue');
        const neoBtn = document.getElementById('neoBtn');
        const neoResult = document.getElementById('neoResult');

        function setNeoResult(message, state) {
            neoResult.textContent = message;
            neoResult.className = 'ota-result ' + (state || '');
        }

        neoRange.addEventListener('input', () => {
            neoValue.textContent = neoRange.value + ' %';
        });

        fetch('/api/neopixel')
            .then((r) => r.json())
            .then((data) => {
                const pct = Math.max(0, Math.min(100, parseInt(data.brightness, 10) || 0));
                neoRange.value = pct;
                neoValue.textContent = pct + ' %';
                setNeoResult('Intensité actuelle : ' + pct + ' %', 'info');
            })
            .catch(() => setNeoResult("Impossible de lire l'intensité actuelle", 'error'));

        neoBtn.addEventListener('click', () => {
            const value = neoRange.value;
            neoBtn.disabled = true;
            setNeoResult('Enregistrement...', 'info');

            fetch('/api/neopixel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'value=' + encodeURIComponent(value)
            })
                .then((r) => r.json())
                .then((data) => {
                    if (data.ok) {
                        setNeoResult('✅ Intensité réglée sur ' + data.brightness + ' %', 'success');
                    } else {
                        setNeoResult('❌ ' + (data.message || 'Erreur inconnue'), 'error');
                    }
                })
                .catch(() => setNeoResult('❌ Erreur réseau', 'error'))
                .finally(() => { neoBtn.disabled = false; });
        });
    </script>
</body>
</html>
